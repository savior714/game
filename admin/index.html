<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 가입 계정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; word-break: keep-all; }
  </style>
</head>
<body class="bg-[#F8F6F3] min-h-screen text-gray-800 pb-16">

  <header class="bg-white border-b border-gray-200 px-5 py-4 sticky top-0 z-50">
    <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <button type="button" onclick="location.href='../index.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 hover:bg-gray-100 transition-colors shrink-0" aria-label="홈">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-gray-900">관리자</h1>
          <p class="text-xs text-gray-500 mt-0.5">구글 로그인으로 가입된 계정</p>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button type="button" id="btn-login" class="text-sm font-semibold text-blue-600 hover:text-blue-800 px-3 py-2">구글 로그인</button>
        <button type="button" id="btn-logout" class="hidden text-sm text-gray-500 hover:text-gray-800 px-3 py-2">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-5 py-6">

    <div id="gate" class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 text-center">
      <p id="status" class="text-sm text-gray-500 mb-4">구글로 로그인해 주세요.</p>
      <p class="text-xs text-gray-400 leading-relaxed">
        접속 URL은 북마크만 사용하세요. 메인 화면에는 관리자 링크를 두지 않았습니다.<br>
        <code class="text-[11px] bg-gray-50 px-1 rounded">global/auth.js</code>의 관리자 이메일과 Supabase RLS 정책의 이메일을 동일하게 설정해야 합니다.
      </p>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <p class="text-sm text-gray-600">
          로그인: <span id="admin-email" class="font-medium text-gray-900"></span>
        </p>
        <button type="button" id="btn-refresh" class="text-sm font-semibold text-blue-600 hover:text-blue-800">새로고침</button>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/80">
          <span class="text-sm font-bold text-gray-800">활성 계정</span>
          <span class="text-xs text-gray-500"><span id="user-count">0</span>명</span>
        </div>
        <ul id="user-list" class="px-5 py-2 max-h-[70vh] overflow-y-auto"></ul>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../global/auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>

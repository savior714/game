<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 놀이</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="rocket.css">
</head>
<body>

<a href="../index.html" class="home-link">← 홈</a>
<h1>📚 영어 놀이</h1>

<div id="score-board">
  <div class="score-item">문제 <span id="q-count">1</span> / 10</div>
  <div class="score-item">점수 <span id="q-score">0</span></div>
  <button id="stats-btn" onclick="openStats()">📊 통계</button>
</div>

<div id="main-area">

  <!-- 로켓 패널 -->
  <div id="rocket-panel">
    <div id="rp-space-label" class="rp-zone-label">SPACE</div>
    <div id="rp-track">
      <div id="rp-nebula"></div>
      <div id="rp-stars"></div>
      <div class="rp-cloud rp-cloud--a"><span></span></div>
      <div class="rp-cloud rp-cloud--b"><span></span></div>
      <div id="rp-atmosphere-glow"></div>
      <div id="rp-ground"></div>
      <div id="rp-goal-earth" aria-label="goal-earth"></div>
      <div id="rp-flame">🔥</div>
      <div id="rp-rocket">🚀</div>
    </div>
    <div id="rp-ground-label" class="rp-zone-label">EARTH</div>
    <div id="streak-badge">🔥 0 / 20</div>
  </div>

  <!-- 게임 카드 -->
  <div id="game-card">
    <div id="game-area">
      <div id="timer-label">⏱ <span id="timer-text">20</span>초</div>
      <div id="timer-wrap"><div id="timer-bar"></div></div>
      <div id="question"></div>
      <div id="answer-buttons"></div>
      <div id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">다음 문제 ▶</button>
    </div>

    <div id="result-screen">
      <div id="stars"></div>
      <h2 id="result-title"></h2>
      <p id="result-msg"></p>
      <button id="restart-btn" onclick="startGame()">다시 하기!</button>
    </div>
  </div>

</div>

<!-- 통계 모달 -->
<div id="stats-modal" onclick="onModalBackdrop(event)">
  <div id="stats-box">
    <h3>📊 카테고리별 기록</h3>
    <table id="stats-table">
      <thead>
        <tr><th>카테고리</th><th>시도</th><th>정답률</th><th>평균 시간</th><th>숙련도</th></tr>
      </thead>
      <tbody id="stats-tbody"></tbody>
    </table>
    <div class="stats-actions">
      <button id="close-stats-btn" onclick="closeStats()">닫기</button>
      <button id="reset-stats-btn" onclick="confirmResetStats()">기록 초기화</button>
    </div>
  </div>
</div>

<script src="../common/progress-engine.js"></script>
<script src="words.js"></script>
<script src="advanced-questions.js"></script>
<script src="engine.js"></script>
<script src="../common/rocket-effects.js"></script>
<script src="../common/rocket-core.js"></script>
<script src="rocket.js"></script>
<script src="../common/quiz-ui-core.js"></script>
<script src="ui.js"></script>
<script src="../global/reward_ui.js"></script>
<script src="../global/reward.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 게임 놀이터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', -apple-system, sans-serif; word-break: keep-all; }

    /* Spring hover */
    .spring {
      transition:
        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .card-live:hover { transform: translateY(-6px) scale(1.015); }
    .card-live:hover .shadow-card  { box-shadow: 0 20px 60px rgba(0,0,0,0.12); }

    /* Arrow circle nudge */
    .arrow-nudge { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .card-live:hover .arrow-nudge  { transform: translateX(5px); }

    /* Orb breathing */
    @keyframes breathe {
      0%,100% { transform: scale(1);   opacity: 0.55; }
      50%      { transform: scale(1.12); opacity: 0.75; }
    }
    .orb   { animation: breathe 9s ease-in-out infinite; }
    .orb-b { animation-delay: -4.5s; }
  </style>
</head>
<body class="bg-[#F8F6F3] min-h-screen overflow-x-hidden">

  <!-- Ambient orbs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
    <div class="orb   absolute -top-40 -right-40 w-[480px] h-[480px] rounded-full bg-orange-300/20 blur-[80px]"></div>
    <div class="orb orb-b absolute -bottom-40 -left-40 w-[360px] h-[360px] rounded-full bg-blue-300/15 blur-[80px]"></div>
  </div>

  <div class="relative z-10 max-w-[640px] mx-auto px-5 py-16 pb-20">

    <!-- ── Header ─────────────────────────────── -->
    <header class="mb-14">
      <div class="inline-flex items-center gap-2 bg-white border border-black/[.07] rounded-full px-4 py-1.5 text-[11px] tracking-wide text-gray-400 font-semibold mb-7 shadow-sm">
        <span class="w-2 h-2 rounded-full bg-orange-500 flex-shrink-0"></span>
        어린이 학습 게임
      </div>

      <h1 class="text-[clamp(2rem,9vw,3.2rem)] font-extrabold text-gray-900 leading-[1.12] tracking-[-0.035em] mb-4">
        오늘은 어떤<br>
        <span class="text-orange-500">공부</span>를 해볼까요?
      </h1>
      <p class="text-gray-500 text-[0.95rem] leading-relaxed">
        게임처럼 재미있게, 실력은 확실하게
      </p>
    </header>

    <!-- ── Bento Grid ──────────────────────────── -->
    <!--
      Mobile  : 2-col (수학 + 영어 top, 국어 + 과학 bottom)
      Tablet+ : 4-col bento (수학 large left 2×2, 영어 right top 2-col, 국어·과학 right bottom 1-col each)
    -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">

      <!-- 수학 ─ large card, spans 2×2 on sm+ -->
      <a href="math/index.html"
         class="card-live spring col-span-1 sm:col-span-2 sm:row-span-2 block bg-white rounded-2xl p-[3px] border border-black/[.06] shadow-sm">
        <div class="bg-orange-50 rounded-[17px] border border-orange-100/50 p-7 h-full flex flex-col min-h-[200px] sm:min-h-[260px]">
          <span class="text-[10px] font-black tracking-[0.12em] uppercase text-orange-500 bg-white/80 rounded-full px-3 py-1 w-fit">수학</span>
          <div class="text-[3rem] sm:text-[4rem] mt-5 mb-1 leading-none select-none">🔢</div>
          <div class="text-[1.4rem] sm:text-[1.7rem] font-extrabold text-gray-900 tracking-tight">수학 놀이</div>
          <div class="text-[0.82rem] text-gray-500 leading-relaxed mt-1">
            덧셈 · 뺄셈 · 곱셈<br>
            연속 정답으로 로켓 발사!
          </div>
          <div class="mt-auto pt-5 flex items-center gap-2.5 text-orange-500 font-bold text-sm">
            <span class="arrow-nudge w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white text-xs flex-shrink-0">→</span>
            시작하기
          </div>
        </div>
      </a>

      <!-- 영어 ─ spans 2 cols on sm+ -->
      <a href="english/index.html"
         class="card-live spring col-span-1 sm:col-span-2 block bg-white rounded-2xl p-[3px] border border-black/[.06] shadow-sm">
        <div class="bg-blue-50 rounded-[17px] border border-blue-100/50 p-6 h-full flex flex-col">
          <span class="text-[10px] font-black tracking-[0.12em] uppercase text-blue-600 bg-white/80 rounded-full px-3 py-1 w-fit">영어</span>
          <div class="text-[2.4rem] mt-4 mb-1 leading-none select-none">📚</div>
          <div class="text-[1.2rem] font-extrabold text-gray-900 tracking-tight">영어 놀이</div>
          <div class="text-[0.8rem] text-gray-500 leading-relaxed mt-1">단어 · 문장 퀴즈로 영어 실력 UP!</div>
          <div class="mt-auto pt-4 flex items-center gap-2 text-blue-600 font-bold text-sm">
            <span class="arrow-nudge w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs flex-shrink-0">→</span>
            시작하기
          </div>
        </div>
      </a>

      <!-- 국어 ─ active -->
      <a href="korean/index.html"
         class="card-live spring col-span-1 bg-white rounded-2xl p-[3px] border border-black/[.06] shadow-sm">
        <div class="bg-purple-50 rounded-[17px] border border-purple-100/50 p-5 h-full flex flex-col">
          <span class="text-[10px] font-black tracking-[0.12em] uppercase text-purple-600 bg-white/80 rounded-full px-3 py-1 w-fit">국어</span>
          <div class="text-[2.2rem] mt-3 mb-1 leading-none select-none">📖</div>
          <div class="text-[1.1rem] font-extrabold text-gray-900 tracking-tight">국어 놀이</div>
          <div class="text-[0.78rem] text-gray-500 leading-relaxed mt-1">받침 · 맞춤법 · 어휘</div>
          <div class="mt-auto pt-4 flex items-center gap-2 text-purple-600 font-bold text-sm">
            <span class="arrow-nudge w-7 h-7 rounded-full bg-purple-600 flex items-center justify-center text-white text-xs flex-shrink-0">→</span>
            시작하기
          </div>
        </div>
      </a>

      <!-- 과학 ─ active -->
      <a href="science/index.html"
         class="card-live spring col-span-1 bg-white rounded-2xl p-[3px] border border-black/[.06] shadow-sm">
        <div class="bg-emerald-50 rounded-[17px] border border-emerald-100/50 p-5 h-full flex flex-col">
          <span class="text-[10px] font-black tracking-[0.12em] uppercase text-emerald-600 bg-white/80 rounded-full px-3 py-1 w-fit">과학</span>
          <div class="text-[2.2rem] mt-3 mb-1 leading-none select-none">🔬</div>
          <div class="text-[1.1rem] font-extrabold text-gray-900 tracking-tight">과학 놀이</div>
          <div class="text-[0.78rem] text-gray-500 leading-relaxed mt-1">분류 · 개념 퀴즈</div>
          <div class="mt-auto pt-4 flex items-center gap-2 text-emerald-600 font-bold text-sm">
            <span class="arrow-nudge w-7 h-7 rounded-full bg-emerald-600 flex items-center justify-center text-white text-xs flex-shrink-0">→</span>
            시작하기
          </div>
        </div>
      </a>

    </div>

    <!-- ── Footer ─────────────────────────────── -->
    <footer class="mt-14 text-center text-[11px] text-gray-300 font-medium tracking-wide">
      매일 조금씩, 실력은 쑥쑥
    </footer>

  </div>

  <script src="global/reward.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>숫자 놀이</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="rocket.css">
</head>
<body>

<h1>🔢 숫자 놀이!</h1>

<div id="score-board">
  <div class="score-item">문제 <span id="q-count">1</span> / 10</div>
  <div class="score-item">점수 <span id="q-score">0</span></div>
  <button id="stats-btn" onclick="openStats()">📊 통계</button>
  <button id="marble-btn" onclick="showMarbleGame()">🎮 마블 게임!</button>
</div>

<div id="main-area">

  <!-- 로켓 패널 -->
  <div id="rocket-panel">
    <div id="rp-space-label">🌌</div>
    <div id="rp-track">
      <div id="rp-stars"></div>
      <div class="rp-cloud" style="bottom:28%">☁️</div>
      <div class="rp-cloud" style="bottom:20%; left:30%; transform:none; font-size:0.9rem">☁️</div>
      <div id="rp-flame">🔥</div>
      <div id="rp-rocket">🚀</div>
    </div>
    <div id="rp-ground-label">🌍</div>
    <div id="streak-badge">🔥 0 / 20</div>
  </div>

  <!-- 게임 카드 -->
  <div id="game-card">
    <div id="game-area">
      <div id="timer-label">⏱ <span id="timer-text">20</span>초</div>
      <div id="timer-wrap"><div id="timer-bar"></div></div>
      <div id="question"></div>
      <div id="answer-buttons"></div>
      <div id="feedback"></div>
      <button id="next-btn" onclick="nextQuestion()">다음 문제 ▶</button>
    </div>

    <div id="result-screen">
      <div id="stars"></div>
      <h2 id="result-title"></h2>
      <p id="result-msg"></p>
      <button id="restart-btn" onclick="startGame()">다시 하기!</button>
    </div>
  </div>

</div>

<!-- 마블 머지 미니게임 모달 -->
<div id="marble-modal">
  <div id="marble-wrap">
    <div id="marble-header">
      <span>🔮 마블 머지!</span>
      <span>점수: <strong id="mb-score-val">0</strong></span>
      <button id="mb-close-btn" onclick="closeMarbleGame()">✕</button>
    </div>
    <canvas id="marble-canvas" width="320" height="480"
      onclick="onMbInput(event)"
      ontouchstart="onMbInput(event)"></canvas>
    <div id="marble-over">
      <h3>게임 종료!</h3>
      <p>점수: <strong id="mb-final">0</strong></p>
      <button class="mb-btn mb-btn-primary" onclick="_mbInit()">다시 하기</button>
      <button class="mb-btn mb-btn-secondary" onclick="closeMarbleGame()">닫기</button>
    </div>
  </div>
</div>

<!-- 통계 모달 -->
<div id="stats-modal" onclick="onModalBackdrop(event)">
  <div id="stats-box">
    <h3>📊 연산별 기록</h3>
    <table id="stats-table">
      <thead>
        <tr>
          <th>연산</th><th>시도</th><th>정답률</th><th>평균 시간</th><th>난이도</th>
        </tr>
      </thead>
      <tbody id="stats-tbody"></tbody>
    </table>
    <div class="stats-actions">
      <button id="close-stats-btn" onclick="closeStats()">닫기</button>
      <button id="reset-stats-btn" onclick="confirmResetStats()">기록 초기화</button>
    </div>
  </div>
</div>

<script src="sound.js"></script>
<script src="marble.js"></script>
<script src="engine.js"></script>
<script src="rocket.js"></script>
<script src="ui.js"></script>
</body>
</html>

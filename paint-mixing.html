<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>물감 색 섞기 실험 | Space Explorer</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .mix-layout {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 1rem;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.6rem;
      margin-top: 0.5rem;
    }

    .color-chip {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 10px;
      padding: 0.72rem 0.75rem;
      font-weight: 700;
      font-size: 0.92rem;
      color: #111827;
      background: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .color-chip.is-selected {
      transform: translateY(-1px);
      border-color: rgba(17, 24, 39, 0.28);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.14);
    }

    .result-swatch {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 230px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: #f3f4f6;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
    }

    .beaker {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      border-radius: 12px;
      border: 2px solid rgba(17, 24, 39, 0.28);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.04));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    .liquid-layer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 74%;
      background: rgba(243, 244, 246, 0.92);
      transition: background 0.3s ease;
    }

    .drop-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .paint-drop {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
      transform: translate(-50%, -50%);
      animation: paint-drop-fall 0.58s ease-in forwards;
    }

    .drop-ripple {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid currentColor;
      transform: translate(-50%, -50%);
      opacity: 0.55;
      animation: drop-ripple-expand 0.55s ease-out forwards;
    }

    .pipette {
      position: absolute;
      right: 22%;
      top: 12px;
      z-index: 4;
      width: 16px;
      height: 48px;
      border-radius: 9px;
      background: linear-gradient(180deg, #e5e7eb 0%, #94a3b8 100%);
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.2);
      transform: rotate(20deg);
      transform-origin: 50% 12%;
      transition: transform 0.22s ease;
      pointer-events: none;
    }

    .pipette.is-dropping {
      transform: rotate(20deg) translateY(4px);
    }

    @keyframes paint-drop-fall {
      from {
        top: 26px;
        opacity: 1;
      }
      to {
        top: 164px;
        opacity: 0.92;
      }
    }

    @keyframes drop-ripple-expand {
      from {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0.5;
      }
      to {
        transform: translate(-50%, -50%) scale(2.9);
        opacity: 0;
      }
    }

    .result-swatch-wrap {
      position: relative;
      width: 100%;
      height: 230px;
      border-radius: 12px;
      overflow: hidden;
    }

    .three-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 900px) {
      .mix-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="brand">Space Explorer</h1>
    <nav aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="./index.html">홈</a></li>
        <li><a href="./space-explorer.html">태양계 탐험</a></li>
        <li><a href="./orbit-eclipse.html">공전·자전과 일식/월식</a></li>
        <li><a href="./paint-mixing.html" aria-current="page">물감 색 섞기 실험</a></li>
      </ul>
    </nav>
  </header>

  <main class="container mix-layout">
    <section class="card" aria-label="색상 선택 영역">
      <h2>물감 선택</h2>
      <p class="gesture-hint">원하는 색을 누를수록 한 방울씩 더 들어가며 색이 점점 짙어져요.</p>
      <div class="palette" role="group" aria-label="색상 팔레트">
        <button type="button" class="color-chip" data-color="yellow">노랑</button>
        <button type="button" class="color-chip" data-color="blue">파랑</button>
        <button type="button" class="color-chip" data-color="red">빨강</button>
        <button type="button" class="color-chip" data-color="white">하양</button>
        <button type="button" class="color-chip" data-color="black">검정</button>
      </div>
      <div class="control-group" style="margin-top: 0.8rem;">
        <label for="paint-brightness">밝기</label>
        <input id="paint-brightness" name="paint-brightness" type="range" min="70" max="115" step="1" value="100" />
        <p id="paint-brightness-status" class="mini-note">밝기 100%</p>
      </div>
      <div class="control-group" style="margin-top: 0.8rem;">
        <button id="paint-reset-button" type="button">초기화</button>
      </div>
    </section>

    <aside class="card controls-panel" aria-label="혼합 결과 영역">
      <h2>혼합 결과</h2>
      <div class="result-swatch-wrap">
        <div id="paint-mixing-three-layer" class="three-layer" aria-hidden="true"></div>
        <div id="paint-result-swatch" class="result-swatch" role="img" aria-label="섞은 물감 결과 색"></div>
        <div id="paint-beaker" class="beaker" aria-hidden="true">
          <div id="paint-liquid-layer" class="liquid-layer"></div>
          <div id="paint-drop-layer" class="drop-layer"></div>
        </div>
        <div id="paint-pipette" class="pipette" aria-hidden="true"></div>
      </div>
      <p id="paint-mix-status" class="status-badge" aria-live="polite" style="margin-top: 0.7rem;">색을 선택하면 결과가 여기에 보여요.</p>
    </aside>
  </main>

  <script type="module" src="./space-explorer/paint-mixing.js"></script>
</body>
</html>

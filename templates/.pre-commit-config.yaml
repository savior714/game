repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: just typecheck
        language: system
        types: [python]
        pass_filenames: false

      - id: verify
        name: verify
        entry: ./verify.sh
        language: system
        pass_filenames: false

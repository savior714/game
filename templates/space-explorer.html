<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우주 탐험 | Space Explorer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <h1 class="brand">Space Explorer</h1>
    <nav aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="./index.html">홈</a></li>
        <li><a href="./space-explorer.html" aria-current="page">우주 탐험</a></li>
      </ul>
    </nav>
  </header>

  <main class="container explorer-layout">
    <section class="card canvas-panel" aria-label="태양계 캔버스 영역">
      <h2>태양계 시뮬레이션 (MVP)</h2>
      <canvas id="solar-system-canvas" width="960" height="540" role="img" aria-label="태양과 행성 시뮬레이션 캔버스" aria-describedby="simulation-status"></canvas>
    </section>

    <aside class="card controls-panel" aria-label="시뮬레이션 컨트롤">
      <h2>컨트롤</h2>
      <p id="simulation-status" class="status-badge" aria-live="polite">재생 중 · 1x</p>
      <div class="control-group">
        <button type="button" data-action="play">재생</button>
        <button type="button" data-action="pause">일시정지</button>
        <button type="button" data-action="reset">초기화</button>
      </div>
      <div class="control-group">
        <label for="time-scale">속도</label>
        <select id="time-scale" name="time-scale">
          <option>0.5x</option>
          <option selected>1x</option>
          <option>2x</option>
          <option>5x</option>
        </select>
      </div>
      <div class="control-group">
        <label for="render-quality">디테일</label>
        <select id="render-quality" name="render-quality">
          <option value="high" selected>높음</option>
          <option value="low">낮음</option>
        </select>
      </div>
      <div class="control-group">
        <label>
          <input type="checkbox" checked />
          행성 라벨 표시
        </label>
      </div>
    </aside>
  </main>
  <script type="module" src="./space-explorer/main.js"></script>
</body>
</html>
